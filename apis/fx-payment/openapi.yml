openapi: 3.1.1
info:
  title: Trace FX Payments API
  version: 1.0.0
  description: |
    API for deposits, withdrawals, swaps, and beneficiary management
    on the Trace FX platform.

    **This spec is a scaffold — endpoints require request/response schemas.**
servers:
  - url: https://faas.sandbox.tracefinance.io/payment
    description: Sandbox
  - url: https://faas.tracefinance.io/payment
    description: Production
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Auth0 JWT token. Include as `Authorization: Bearer <token>`."
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: "RESOURCE_NOT_FOUND"
        message:
          type: string
          example: "The requested resource was not found"
        details:
          type: object
          additionalProperties: true
          example: {}
      required:
        - code
        - message
paths:
  # --- Operations: Deposits ---
  /api/deposits:
    post:
      operationId: createDeposit
      tags:
        - Operations
      summary: Create a deposit
      description: "TODO: Add request/response schemas from fx-payment docs."
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - name: X-Trace-Version
          in: header
          required: false
          schema:
            type: string
      responses:
        "201":
          description: Deposit created.
        "400":
          description: Invalid request data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --- Operations: Withdrawals ---
  /api/withdrawals:
    post:
      operationId: createWithdrawal
      tags:
        - Operations
      summary: Create a withdrawal
      description: "TODO: Add request/response schemas from fx-payment docs."
      parameters:
        - name: X-Idempotency-Key
