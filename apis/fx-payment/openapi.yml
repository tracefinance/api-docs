            type: string
        - name: X-Trace-Version
          in: header
          required: false
          schema:
            type: string
      responses:
        "201":
          description: Withdrawal created.
        "400":
          description: Invalid request data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --- Operations: Swaps ---
  /api/swaps:
    post:
      operationId: createSwap
      tags:
        - Operations
      summary: Create a swap
      description: "TODO: Add request/response schemas from fx-payment docs."
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - name: X-Trace-Version
          in: header
          required: false
          schema:
            type: string
      responses:
        "201":
          description: Swap created.
        "400":
          description: Invalid request data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --- Operations: Read ---
  /api/operations/{operationId}:
    get:
      operationId: getOperation
      tags:
        - Operations
      summary: Get an operation
      description: "TODO: Add response schema from fx-payment docs."
      parameters:
        - name: operationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Trace-Version
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Operation details.
        "404":
          description: Operation not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/operations:
    get:
      operationId: listOperations
      tags:
        - Operations
      summary: List operations
      description: "TODO: Add query parameters and response schema from fx-payment docs."
      parameters:
        - name: X-Trace-Version
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of operations.

  # --- Beneficiaries ---
