openapi: 3.1.0
info:
  title: FX Account API
  version: 1.0.0
  description: API for managing multi-currency accounts on the Trace FX platform.
servers:
  - url: https://faas.sandbox.tracefinance.io/account
    description: Sandbox
  - url: https://faas.tracefinance.io/account
    description: Production
security:
  - bearerAuth: []
tags:
  - name: Accounts
    description: Create, list, and manage multi-currency accounts.
  - name: Beneficial owners
    description: Manage beneficial owners (UBOs) for company-owned accounts.
  - name: Documents
    description: Upload documents to fulfill account and UBO requirements.
  - name: Funding instructions
    description: Retrieve funding instructions for depositing into an account.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Auth0 JWT token. Include as `Authorization: Bearer <token>`."
  parameters:
    AccountId:
      name: accountId
      in: path
      required: true
      description: UUID of the account.
      schema:
        type: string
        format: uuid
    UboId:
      name: uboId
      in: path
      required: true
      description: UUID of the beneficial owner.
      schema:
        type: string
        format: uuid
    TraceVersion:
      name: X-Trace-Version
      in: header
      required: false
      description: API version. Omit to use the default version.
      schema:
        type: string
        example: "1"
    IdempotencyKey:
      name: X-Idempotency-Key
      in: header
      required: false
      description: Unique key to ensure idempotent request processing.
      schema:
        type: string
        format: uuid
    PaginationLimit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return. Defaults to 10.
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100
    PaginationCursor:
      name: cursor
      in: query
      required: false
      description: Opaque cursor for fetching the next or previous page.
      schema:
        type: string
    PaginationDirection:
      name: direction
      in: query
      required: false
      description: Direction of pagination relative to the cursor.
      schema:
        type: string
        enum:
          - NEXT
          - PREVIOUS
    PaginationSortOrder:
      name: sortOrder
      in: query
      required: false
      description: Sort order for results. Defaults to DESCENDING.
      schema:
        type: string
        enum:
          - ASCENDING
          - DESCENDING
        default: DESCENDING
    PaginationIncludeTotalMatches:
      name: includeTotalMatches
      in: query
      required: false
      description: Whether to include the total number of matching records in the response metadata.
      schema:
        type: boolean
        default: false
  schemas:
    # ── Request schemas ──────────────────────────────────────────────
    CreateAccountRequest:
      type: object
      description: Request body for creating a new account.
      properties:
        assets:
          type: array
          description: Desired asset currencies. At least one required; each code must be unique.
          minItems: 1
          items:
            $ref: "#/components/schemas/AssetRequest"
        owner:
          $ref: "#/components/schemas/OwnerRequest"
      required:
        - assets
        - owner
    AssetRequest:
      type: object
      properties:
        code:
          $ref: "#/components/schemas/Currency"
        isVirtual:
          type: boolean
          description: Whether this is a virtual (non-custodial) asset.
          example: false
      required:
        - code
        - isVirtual
    OwnerRequest:
      description: The legal entity that owns the account. Discriminated by `type`.
      oneOf:
        - $ref: "#/components/schemas/CompanyOwnerRequest"
        - $ref: "#/components/schemas/IndividualOwnerRequest"
      discriminator:
        propertyName: type
        mapping:
          COMPANY: "#/components/schemas/CompanyOwnerRequest"
          INDIVIDUAL: "#/components/schemas/IndividualOwnerRequest"
    CompanyOwnerRequest:
      title: Company
      type: object
      properties:
        type:
          type: string
          enum:
            - COMPANY
        legalName:
          type: string
          description: Registered legal name of the company.
          example: "Acme Ltda"
        taxId:
          $ref: "#/components/schemas/TaxIdRequest"
        industry:
          type: string
          description: Industry classification.
          enum:
            - ACCOUNTING
            - ADVERTISING__MARKETING
            - AEROSPACE__DEFENSE
            - AGRICULTURE__FORESTRY
            - AMUSEMENT_AND_RECREATION
            - AUTOMOTIVE
            - CONSTRUCTION__CARPENTRY__LANDSCAPING
            - CUSTOMER_SERVICE_AND_SUPPORT
            - EDUCATION
            - ENERGY
            - ENGINEERING
            - FINANCIAL_SERVICES
            - HEALTHCARE__MEDICAL_SERVICES
            - HOTEL__HOSPITALITY
            - INFORMATION_TECHNOLOGY
            - MANUFACTURING
            - MEDIA__ENTERTAINMENT
            - MINING_OIL_AND_GAS
            - NON_PROFIT__NGO__CHARITY
            - PHARMACEUTICALS
            - PRINTING__PUBLISHING
            - REAL_ESTATE
            - RESTAURANT__FOOD_SERVICE
            - RETAIL_SALES__RETAIL_TRADE
            - SECURITY
            - TRANSPORTATION
            - TRAVEL
            - UTILITIES
            - WHOLESALE
            - OTHERS
          example: "INFORMATION_TECHNOLOGY"
        incorporateDate:
          type: string
          format: date
          nullable: true
          description: Company incorporation date in ISO format (yyyy-MM-dd). Optional.
          example: "2018-05-12"
        address:
          $ref: "#/components/schemas/AddressRequest"
      required:
        - type
        - legalName
        - taxId
        - industry
        - address
    IndividualOwnerRequest:
      title: Individual
      type: object
      properties:
        type:
          type: string
          enum:
            - INDIVIDUAL
        firstName:
          type: string
          description: First name of the individual.
          example: "Maria"
        lastName:
          type: string
          description: Last name of the individual.
          example: "Silva"
        taxId:
          $ref: "#/components/schemas/TaxIdRequest"
        birthDate:
          type: string
          format: date
          nullable: true
          description: Date of birth in ISO format (yyyy-MM-dd). Optional.
          example: "1990-03-21"
        address:
          $ref: "#/components/schemas/AddressRequest"
      required:
        - type
        - firstName
        - lastName
        - taxId
        - address
    TaxIdRequest:
      type: object
      description: Tax identifier for the owner or beneficial owner. Validated against the country and type.
      properties:
        value:
          type: string
          description: Tax identifier digits or alphanumeric value (depending on type).
          example: "11222333000181"
        type:
          $ref: "#/components/schemas/TaxIdType"
        country:
          $ref: "#/components/schemas/Country"
      required:
        - value
        - type
        - country
    AddressRequest:
      type: object
      properties:
        addressLine1:
          type: string
          example: "Rua das Flores, 100"
        addressLine2:
          type: string
          nullable: true
          example: "Suite 456"
        city:
          type: string
          example: "São Paulo"
        state:
          type: string
          example: "SP"
        country:
          $ref: "#/components/schemas/Country"
        postalCode:
          type: string
          example: "01234-567"
      required:
        - addressLine1
        - city
        - state
        - country
        - postalCode
    UBORequest:
      type: object
      description: Request body for adding a beneficial owner.
      properties:
        name:
          type: string
          description: Full legal name of the beneficial owner.
          example: "João Silva"
        taxId:
          $ref: "#/components/schemas/TaxIdRequest"
        address:
          $ref: "#/components/schemas/AddressRequest"
        ownershipPercentage:
          type: number
          format: double
          nullable: true
          description: Percentage of ownership. Optional.
          example: 50.0
      required:
        - name
        - taxId
        - address
    UpdateUBORequest:
      type: object
      description: Request body for updating a beneficial owner. All fields are optional (patch semantics).
      properties:
        name:
          type: string
          description: Full legal name of the beneficial owner.
          example: "João Silva"
        taxId:
          $ref: "#/components/schemas/TaxIdRequest"
        address:
          $ref: "#/components/schemas/AddressRequest"
        ownershipPercentage:
          type: number
          format: double
          nullable: true
          description: Percentage of ownership.
          example: 75.0

    # ── Response schemas ─────────────────────────────────────────────
    AccountResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "a1b2c3d4-5e6f-7890-abcd-ef1234567890"
        sourceAccountId:
          type: string
          format: uuid
          nullable: true
          description: Parent account ID. Null for named accounts.
          example: null
        customer:
          $ref: "#/components/schemas/CustomerResponse"
        owner:
          $ref: "#/components/schemas/OwnerResponse"
        assets:
          type: array
          description: Assets enabled on the account, with the onboarding status of the underlying provider account.
          items:
            $ref: "#/components/schemas/AssetResponse"
        requirements:
          $ref: "#/components/schemas/RequirementsResponse"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagResponse"
        currentState:
          $ref: "#/components/schemas/AccountState"
        states:
          type: array
          description: Full state history of the account.
          items:
            $ref: "#/components/schemas/AccountState"
        createdAt:
          type: string
          format: date-time
          example: "2026-01-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-01-15T10:30:00Z"
      required:
        - id
        - customer
        - owner
        - assets
        - requirements
        - tags
        - currentState
        - states
        - createdAt
        - updatedAt
    AssetResponse:
      type: object
      description: An asset available on the account and the onboarding status of its underlying provider account.
      properties:
        currency:
          $ref: "#/components/schemas/Currency"
        allowsVirtualAccounts:
          type: boolean
          description: Whether virtual accounts can be issued for this asset.
          example: false
        status:
          type: string
          description: Onboarding status of the provider account that custodies this asset.
          enum:
            - ONBOARDING
            - ACTIVE
            - FAILED
            - FROZEN
            - DEACTIVATED
          example: "ONBOARDING"
      required:
        - currency
        - allowsVirtualAccounts
        - status
    CustomerResponse:
      type: object
      properties:
        id:
          type: string
          description: Customer identifier.
          example: "c1a2b3c4-d5e6-7890-abcd-ef1234567890"
      required:
        - id
    OwnerResponse:
      description: The legal entity that owns the account. Discriminated by `type`.
      oneOf:
        - $ref: "#/components/schemas/CompanyOwnerResponse"
        - $ref: "#/components/schemas/IndividualOwnerResponse"
      discriminator:
        propertyName: type
        mapping:
          COMPANY: "#/components/schemas/CompanyOwnerResponse"
          INDIVIDUAL: "#/components/schemas/IndividualOwnerResponse"
    CompanyOwnerResponse:
      title: Company
      type: object
      properties:
        type:
          type: string
          enum:
            - COMPANY
        legalName:
          type: string
          example: "Acme Ltda"
        taxId:
          $ref: "#/components/schemas/TaxIdResponse"
        industry:
          type: string
          example: "INFORMATION_TECHNOLOGY"
        address:
          $ref: "#/components/schemas/AddressResponse"
        ubos:
          type: array
          items:
            $ref: "#/components/schemas/UBOResponse"
      required:
        - type
        - legalName
        - taxId
        - industry
        - address
        - ubos
    IndividualOwnerResponse:
      title: Individual
      type: object
      properties:
        type:
          type: string
          enum:
            - INDIVIDUAL
        firstName:
          type: string
          example: "Maria"
        lastName:
          type: string
          example: "Silva"
        taxId:
          $ref: "#/components/schemas/TaxIdResponse"
        address:
          $ref: "#/components/schemas/AddressResponse"
      required:
        - type
        - firstName
        - lastName
        - taxId
        - address
    TaxIdResponse:
      type: object
      description: Tax identifier returned for an owner or beneficial owner.
      properties:
        value:
          type: string
          example: "11222333000181"
        type:
          $ref: "#/components/schemas/TaxIdType"
        country:
          $ref: "#/components/schemas/Country"
      required:
        - value
        - type
        - country
    AddressResponse:
      type: object
      properties:
        addressLine1:
          type: string
          example: "Rua das Flores, 100"
        addressLine2:
          type: string
          nullable: true
          example: "Suite 456"
        city:
          type: string
          example: "São Paulo"
        state:
          type: string
          nullable: true
          example: "SP"
        country:
          $ref: "#/components/schemas/Country"
        postalCode:
          type: string
          example: "01234-567"
      required:
        - addressLine1
        - city
        - country
        - postalCode
    AccountState:
      type: object
      description: A point-in-time state of the account.
      properties:
        status:
          type: string
          enum:
            - ACTION_REQUIRED
            - REVIEWING
            - OPENING
            - ACTIVE
            - REJECTED
            - CLOSED
          example: "ACTION_REQUIRED"
        reason:
          $ref: "#/components/schemas/Reason"
        createdAt:
          type: string
          format: date-time
          example: "2026-01-15T10:30:00Z"
      required:
        - status
        - createdAt
    UBOState:
      type: object
      description: A point-in-time state of a beneficial owner.
      properties:
        status:
          type: string
          enum:
            - PENDING
            - APPROVED
            - REJECTED
          example: "PENDING"
        reason:
          $ref: "#/components/schemas/Reason"
        createdAt:
          type: string
          format: date-time
          example: "2026-01-15T10:30:00Z"
      required:
        - status
        - createdAt
    Reason:
      type: object
      nullable: true
      description: Explains why a state transition occurred.
      properties:
        code:
          type: string
          description: Machine-readable error code.
          example: "DOCUMENT_REJECTED"
        message:
          type: string
          description: Human-readable description.
          example: "Document is illegible"
        details:
          type: object
          additionalProperties: true
          description: Additional context. May be empty.
          example: {}
      required:
        - code
        - message
        - details
    RequirementsResponse:
      type: object
      description: Requirement buckets grouped by lifecycle stage.
      properties:
        currentlyDue:
          type: array
          description: Requirements pending submission.
          items:
            $ref: "#/components/schemas/RequirementResponse"
        pendingVerification:
          type: array
          description: Submitted requirements awaiting verification.
          items:
            $ref: "#/components/schemas/RequirementResponse"
        errors:
          type: array
          description: Rejected requirements with reasons.
          items:
            $ref: "#/components/schemas/RequirementResponse"
        satisfied:
          type: array
          description: Fulfilled requirements.
          items:
            $ref: "#/components/schemas/RequirementResponse"
      required:
        - currentlyDue
        - pendingVerification
        - errors
        - satisfied
    RequirementResponse:
      type: object
      description: |
        A single requirement. The `type` discriminates between two shapes:
        - `DOCUMENT`: a specific document of a given `documentType` is required.
        - `DOCUMENT_GROUP`: any one document from `options` will satisfy the requirement (e.g., proof of identity can be ID card, passport, or driver's license).
      properties:
        type:
          type: string
          description: Requirement type discriminator.
          enum:
            - DOCUMENT
            - DOCUMENT_GROUP
          example: "DOCUMENT"
        documentType:
          allOf:
            - $ref: "#/components/schemas/DocumentType"
          nullable: true
          description: The specific document type required. Set when `type` is `DOCUMENT`.
        documentSubType:
          allOf:
            - $ref: "#/components/schemas/DocumentSubType"
          nullable: true
          description: >
            Sub-classification of the document. Set when the `documentType`
            requires a specific side (e.g., `FRONT_SIDE` for `ID_CARD`).
        group:
          allOf:
            - $ref: "#/components/schemas/RequirementGroup"
          nullable: true
          description: Group identifier. Set when `type` is `DOCUMENT_GROUP`.
        options:
          type: array
          nullable: true
          description: Acceptable document types. Set when `type` is `DOCUMENT_GROUP`.
          items:
            $ref: "#/components/schemas/DocumentType"
        uboId:
          type: string
          format: uuid
          nullable: true
          description: UBO identifier when the requirement belongs to a beneficial owner. `null` for account-level requirements.
        requiredMetadata:
          type: array
          nullable: true
          description: Metadata keys that must accompany the document upload (e.g., `country`, `number`).
          items:
            type: string
          example: ["country"]
        metadata:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Metadata captured for an already-fulfilled requirement.
        reason:
          $ref: "#/components/schemas/Reason"
      required:
        - type
    DocumentType:
      type: string
      description: Type of document.
      enum:
        - PASSPORT
        - ARTICLES_OF_ASSOCIATION
        - OTHER
        - AGREEMENT
        - DIRECTORS_REGISTRY
        - INCORPORATION_ARTICLES
        - INCORPORATION_CERT
        - PROOF_OF_ADDRESS
        - SHAREHOLDER_REGISTRY
        - POWER_OF_ATTORNEY
        - STATE_REGISTRY
        - EVIDENCE_OF_SOURCE_OF_FUNDS
        - EVIDENCE_OF_SOURCE_OF_WEALTH
        - PROOF_OF_REGULATORY_LICENSE
        - PROOF_OF_BUSINESS_ACTIVITY
        - FUND_FLOW_EXPLANATION
        - AML_POLICY
        - FINANCIAL_STATEMENT
        - ORGANIZATIONAL_CHART
        - SHAREHOLDER_OWNERSHIP
        - WOLFSBERG_QUESTIONNAIRE
        - ID_CARD
        - DRIVER_LICENSE
        - RESIDENCE_PERMIT
        - SELFIE
        - UTILITY_BILL
      example: "ARTICLES_OF_ASSOCIATION"
    DocumentSubType:
      type: string
      description: Sub-classification for documents that have multiple sides.
      enum:
        - FRONT_SIDE
        - BACK_SIDE
      example: "FRONT_SIDE"
    RequirementGroup:
      type: string
      description: Logical group of document types that satisfy the same requirement.
      enum:
        - IDENTITY_VERIFICATION
      example: "IDENTITY_VERIFICATION"
    Currency:
      type: string
      description: Fiat or crypto currency code.
      enum:
        - USD
        - BRL
        - EUR
        - CAD
        - AUD
        - GBP
        - MXN
        - HKD
        - SGD
        - PHP
        - NZD
        - CHF
        - NOK
        - DKK
        - PLN
        - SEK
        - USDC
        - USDT
        - EURC
        - BRLT
      example: "BRL"
