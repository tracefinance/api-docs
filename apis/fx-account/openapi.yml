  # ── Documents ────────────────────────────────────────────────────
  /api/accounts/{accountId}/documents:
    post:
      operationId: uploadDocument
      tags:
        - Documents
      summary: Upload a document
      description: |
        Uploads a document to fulfill an account or beneficial owner requirement.

        Use the same endpoint for both account-level documents and UBO-level
        documents — set `uboId` in the JSON body when the document belongs to a
        specific beneficial owner, otherwise omit it.
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/TraceVersion"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                body:
                  $ref: "#/components/schemas/UploadDocumentRequest"
                file:
                  type: string
                  format: binary
                  description: Document file content.
              required:
                - body
                - file
            encoding:
              body:
                contentType: application/json
      responses:
        "204":
          description: Document uploaded.
        "400":
          description: Invalid request or missing multipart fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                emptyFile:
                  summary: Uploaded file is empty
                  value:
                    code: "EMPTY_FILE"
                    message: "File must not be empty: fieldName=file"
                    details:
                      fieldName: "file"
                missingMultipartField:
                  summary: Required multipart field is missing
                  value:
                    code: "MISSING_MULTIPART_FIELD"
                    message: "Missing required multipart field: fieldName=body"
                    details:
                      fieldName: "body"
                invalidUuid:
                  summary: accountId or uboId is not a valid UUID
                  value:
                    code: "INVALID_DATA"
                    message: "Object contains invalid data"
                    details:
                      errors:
                        - code: "INVALID_UUID"
                          message: "'not-a-uuid' cannot be converted to UUID"
                          field: "path:accountId"
                          params: {}
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Account or beneficial owner not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                accountNotFound:
                  $ref: "#/components/examples/AccountNotFound"
                uboNotFound:
                  $ref: "#/components/examples/UboNotFound"
        "422":
          description: No matching requirement for the given document type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Beneficial owner endpoints ───────────────────────────────────
  /api/accounts/{accountId}/ubos:
    post:
      operationId: addUbo
      tags:
        - Beneficial owners
      summary: Add a beneficial owner
