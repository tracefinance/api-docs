      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UBORequest"
            examples:
              basic:
                summary: Add a UBO
                value:
                  name: "João Silva"
                  taxId: "12345678900"
                  address:
                    addressLine1: "Rua das Flores, 100"
                    city: "São Paulo"
                    state: "SP"
                    country: "BR"
                    postalCode: "01234-567"
                  ownershipPercentage: 50.0
      responses:
        "201":
          description: Beneficial owner added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UBOResponse"
