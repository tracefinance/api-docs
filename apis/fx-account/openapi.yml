          type: string
          format: uuid
          example: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
        name:
          type: string
          example: "João Silva"
        taxId:
          $ref: "#/components/schemas/TaxIdResponse"
        address:
          $ref: "#/components/schemas/AddressResponse"
        ownershipPercentage:
          type: number
          format: double
          nullable: true
          example: 50.0
        currentState:
          $ref: "#/components/schemas/UBOState"
      required:
        - id
        - name
        - taxId
        - address
        - currentState
    Rail:
      type: string
      description: Payment rail used to fund a deposit.
      enum:
        - PIX_KEY
        - PIX_STATIC_QR_CODE
        - PIX_DYNAMIC_QR_CODE
        - PIX_BANK_INSTRUCTION
        - BOLETO
        - CRYPTO
        - TED
        - WIRE
        - SWIFT
        - SEPA
        - ACH
    FundingInstructionResponse:
      description: A funding instruction for depositing into an account. Discriminated by `rail`.
      oneOf:
        - $ref: "#/components/schemas/PixKeyFundingInstruction"
        - $ref: "#/components/schemas/PixStaticQrCodeFundingInstruction"
        - $ref: "#/components/schemas/TedFundingInstruction"
        - $ref: "#/components/schemas/BoletoFundingInstruction"
        - $ref: "#/components/schemas/CryptoWalletFundingInstruction"
      discriminator:
        propertyName: rail
        mapping:
          PIX_KEY: "#/components/schemas/PixKeyFundingInstruction"
          PIX_STATIC_QR_CODE: "#/components/schemas/PixStaticQrCodeFundingInstruction"
          TED: "#/components/schemas/TedFundingInstruction"
          BOLETO: "#/components/schemas/BoletoFundingInstruction"
          CRYPTO: "#/components/schemas/CryptoWalletFundingInstruction"
    FundingInstructionBase:
      type: object
      properties:
        asset:
          $ref: "#/components/schemas/Currency"
        rail:
          $ref: "#/components/schemas/Rail"
      required:
        - asset
        - rail
    PixKeyFundingInstruction:
      title: PIX key
      allOf:
        - $ref: "#/components/schemas/FundingInstructionBase"
        - type: object
          properties:
            rail:
              type: string
              enum:
                - PIX_KEY
            keyType:
              type: string
              description: PIX key type.
              enum:
                - CPF
                - CNPJ
                - EMAIL
                - PHONE
                - RANDOM
              example: "CNPJ"
            key:
              type: string
              description: The PIX key value.
              example: "12345678000101"
          required:
            - keyType
            - key
    PixStaticQrCodeFundingInstruction:
      title: PIX static QR code
      allOf:
        - $ref: "#/components/schemas/FundingInstructionBase"
        - type: object
          properties:
            rail:
              type: string
              enum:
                - PIX_STATIC_QR_CODE
            qrCode:
              type: string
              description: Static QR code payload (EMV format).
              example: "00020126580014br.gov.bcb.pix..."
          required:
            - qrCode
    TedFundingInstruction:
      title: TED
      allOf:
        - $ref: "#/components/schemas/FundingInstructionBase"
        - type: object
          properties:
            rail:
              type: string
              enum:
                - TED
            bankCode:
              type: string
              description: Bank code (ISPB or COMPE).
              example: "001"
            branch:
              type: string
              description: Branch number.
              example: "0001"
            accountNumber:
              type: string
              description: Account number.
              example: "123456-7"
            accountType:
              type: string
              description: Type of bank account.
              example: "CHECKING"
          required:
            - bankCode
            - branch
            - accountNumber
            - accountType
    BoletoFundingInstruction:
      title: Boleto
      allOf:
        - $ref: "#/components/schemas/FundingInstructionBase"
        - type: object
          properties:
            rail:
              type: string
              enum:
                - BOLETO
            barcode:
              type: string
              description: Boleto barcode (digitable line).
              example: "23793.38128 60800.000003 00000.000400 1 84340000012345"
            dueDate:
              type: string
              format: date-time
              description: Payment due date.
              example: "2026-04-04T00:00:00Z"
          required:
            - barcode
            - dueDate
    CryptoWalletFundingInstruction:
      title: Crypto wallet
      allOf:
        - $ref: "#/components/schemas/FundingInstructionBase"
        - type: object
          properties:
            rail:
              type: string
              enum:
                - CRYPTO
            network:
              type: string
              description: Blockchain network.
              example: "ETHEREUM"
            walletAddress:
              type: string
              description: Deposit wallet address.
              example: "0x1234567890abcdef1234567890abcdef12345678"
          required:
            - network
            - walletAddress
    UploadDocumentRequest:
      type: object
      description: >
        JSON payload accompanying the document file in the multipart request.
        Sent as the `body` part with `Content-Type: application/json`.
      properties:
        documentType:
          allOf:
            - $ref: "#/components/schemas/DocumentType"
          description: >
            The type of document being uploaded. Must match a `documentType`
            listed in the account's `requirements.currentlyDue` array (or, for
            grouped requirements, appear in `options`).
        documentSubType:
          allOf:
            - $ref: "#/components/schemas/DocumentSubType"
          nullable: true
          description: >
            Sub-classification of the document. Required for document types
            that have sides (e.g., `ID_CARD`, `DRIVER_LICENSE`).
        holder:
          $ref: "#/components/schemas/HolderRequest"
        metadata:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: >
            Additional metadata required by the document type. Keys must match
            the `requiredMetadata` listed on the requirement (e.g., `country`,
            `number`).
          example:
            country: "BR"
      required:
        - documentType
        - holder
    HolderRequest:
      type: object
      description: >
        Identifies who the document belongs to. Use `ACCOUNT` with the account
        ID for account-level documents, or `UBO` with the UBO ID for documents
        belonging to a specific beneficial owner.
      properties:
        type:
          type: string
          enum:
            - ACCOUNT
            - UBO
          example: "ACCOUNT"
        referenceId:
          type: string
          format: uuid
          description: Account ID when `type=ACCOUNT`; UBO ID when `type=UBO`.
          example: "a1b2c3d4-5e6f-7890-abcd-ef1234567890"
      required:
        - type
        - referenceId
    PageMetadata:
      type: object
      properties:
        previous:
          type: string
          nullable: true
          description: Cursor for the previous page.
        next:
          type: string
          nullable: true
          description: Cursor for the next page.
        count:
          type: integer
          description: Number of items in the current page.
        totalMatches:
          type: integer
          nullable: true
          description: Total number of matching records. Only present when `includeTotalMatches` is true.
      required:
        - count
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable description.
        details:
          type: object
          additionalProperties: true
      required:
        - code
        - message
  responses:
    UnauthorizedError:
      description: Missing or invalid authentication token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidToken:
              $ref: "#/components/examples/InvalidToken"
            expiredToken:
              $ref: "#/components/examples/ExpiredToken"
  examples:
    InvalidToken:
      summary: Bearer token is invalid or malformed
      value:
        code: "INVALID_ACCESS_TOKEN"
        message: "Invalid access token"
        details: {}
    ExpiredToken:
      summary: Bearer token has expired
      value:
        code: "EXPIRED_ACCESS_TOKEN"
        message: "Expired access token"
        details: {}
    AccountNotFound:
      summary: Account does not exist for the authenticated customer
      value:
        code: "RESOURCE_NOT_FOUND"
        message: "Account with given parameters [Account.id:5b7c1f2a-3d4e-4f8a-9b1c-2d3e4f5a6b7c, Customer.id:c1a2b3c4-d5e6-7890-abcd-ef1234567890] not found"
        details:
          resource: "Account"
          parameters:
            Account.id: "5b7c1f2a-3d4e-4f8a-9b1c-2d3e4f5a6b7c"
            Customer.id: "c1a2b3c4-d5e6-7890-abcd-ef1234567890"
    UboNotFound:
      summary: Beneficial owner does not exist on the account
      value:
        code: "RESOURCE_NOT_FOUND"
        message: "UBO with given parameters [UBO.id:a1b2c3d4-e5f6-7890-1234-567890abcdef] not found"
        details:
          resource: "UBO"
          parameters:
            UBO.id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"

paths:
  # ── Account endpoints ────────────────────────────────────────────
  /api/accounts:
    post:
      operationId: createAccount
      tags:
        - Accounts
      summary: Create an account
      description: Creates a new multi-currency account for the authenticated customer.
      parameters:
        - $ref: "#/components/parameters/TraceVersion"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
            examples:
              company:
                summary: Company-owned account
                value:
                  assets:
                    - code: "BRL"
                      isVirtual: false
                  owner:
                    type: "COMPANY"
                    legalName: "Acme Ltda"
                    taxId:
                      value: "11222333000181"
                      type: "CNPJ"
                      country: "BR"
                    industry: "INFORMATION_TECHNOLOGY"
                    incorporateDate: "2018-05-12"
                    address:
                      addressLine1: "Rua das Flores, 100"
                      addressLine2: "Suite 456"
                      city: "São Paulo"
                      state: "SP"
                      country: "BR"
                      postalCode: "01234-567"
              individual:
                summary: Individually-owned account
                value:
                  assets:
                    - code: "BRL"
                      isVirtual: false
                  owner:
                    type: "INDIVIDUAL"
                    firstName: "Maria"
                    lastName: "Silva"
                    taxId:
                      value: "12345678909"
                      type: "CPF"
                      country: "BR"
                    birthDate: "1990-03-21"
                    address:
                      addressLine1: "Rua das Flores, 100"
                      city: "São Paulo"
                      state: "SP"
                      country: "BR"
                      postalCode: "01234-567"
      responses:
        "201":
          description: Account created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidTaxId:
                  summary: Owner taxId fails the country/type-specific validator
                  value:
                    code: "INVALID_DATA"
                    message: "Object contains invalid data"
                    details:
                      errors:
                        - code: "VALIDATE_TAX_ID"
                          message: "Tax ID is invalid for the given type and country"
                          field: "body:owner.taxId.value"
                          params: {}
                unsupportedAsset:
                  summary: Requested asset code is not supported
                  value:
                    code: "UNSUPPORTED_ASSET"
                    message: "Asset not supported by any provider: asset=ETH"
                    details:
                      asset: "ETH"
                invalidData:
                  summary: Request body failed validation
                  value:
                    code: "INVALID_DATA"
                    message: "Object contains invalid data"
                    details:
                      errors:
                        - code: "REQUIRED"
                          message: "Parameter 'body:assets' not found in request"
                          field: "body:assets"
                          params: {}
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Customer not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                customerNotFound:
                  summary: Customer not found for the authenticated token
                  value:
                    code: "RESOURCE_NOT_FOUND"
                    message: "Customer with given parameters [id:c1a2b3c4-d5e6-7890-abcd-ef1234567890] not found"
                    details:
                      resource: "Customer"
                      parameters:
                        id: "c1a2b3c4-d5e6-7890-abcd-ef1234567890"
        "422":
          description: Business rule violation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                ubosNotAllowedForIndividual:
                  summary: Individual-owned account cannot have UBOs
                  value:
                    code: "UBOS_NOT_ALLOWED_FOR_INDIVIDUAL"
                    message: "UBOs are not allowed for individual accounts"
                    details:
                      taxId: "12345678900"
    get:
      operationId: listAccounts
      tags:
        - Accounts
      summary: List accounts
      description: Lists all accounts for the authenticated customer. Results are paginated using cursor-based pagination.
      parameters:
        - $ref: "#/components/parameters/TraceVersion"
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationCursor"
        - $ref: "#/components/parameters/PaginationDirection"
        - $ref: "#/components/parameters/PaginationSortOrder"
        - $ref: "#/components/parameters/PaginationIncludeTotalMatches"
      responses:
        "200":
          description: Paginated list of accounts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AccountResponse"
                  meta:
                    $ref: "#/components/schemas/PageMetadata"
                required:
                  - data
                  - meta
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /api/accounts/{accountId}:
    get:
      operationId: getAccount
      tags:
        - Accounts
      summary: Get an account
      description: Retrieves the details of an account by its ID.
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/TraceVersion"
      responses:
        "200":
          description: Account details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "400":
          description: Invalid account ID format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidUuid:
                  summary: accountId path parameter is not a valid UUID
                  value:
                    code: "INVALID_DATA"
                    message: "Object contains invalid data"
                    details:
                      errors:
                        - code: "INVALID_UUID"
                          message: "'not-a-uuid' cannot be converted to UUID"
                          field: "path:accountId"
                          params: {}
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Account not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                accountNotFound:
                  $ref: "#/components/examples/AccountNotFound"

  /api/accounts/{accountId}/review:
    post:
      operationId: submitAccountForReview
      tags:
        - Accounts
      summary: Submit account for review
      description: Submits an account for compliance review. All required documents and data must be provided before calling this endpoint.
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/TraceVersion"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Account submitted for review.
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Account not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                accountNotFound:
                  $ref: "#/components/examples/AccountNotFound"
        "409":
          description: Account state conflict.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                noProviderAccountRequiresAnalysis:
                  summary: Account has no provider accounts awaiting analysis
                  value:
                    code: "NO_PROVIDER_ACCOUNT_REQUIRES_ANALYSIS"
                    message: "Account has no provider accounts requiring analysis"
                    details:
                      accountId: "5b7c1f2a-3d4e-4f8a-9b1c-2d3e4f5a6b7c"
                reviewAlreadySubmitted:
                  summary: Review has already been submitted for the account
                  value:
                    code: "REVIEW_ALREADY_SUBMITTED"
                    message: "Review already submitted for account"
                    details:
                      accountId: "5b7c1f2a-3d4e-4f8a-9b1c-2d3e4f5a6b7c"
        "422":
          description: Business rule violation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingDocumentsForReview:
                  summary: Required documents are missing or rejected
                  value:
                    code: "MISSING_DOCUMENTS_FOR_REVIEW"
                    message: "Not all documents uploaded for review submission"
                    details:
                      accountId: "5b7c1f2a-3d4e-4f8a-9b1c-2d3e4f5a6b7c"
                      missingDocumentTypes:
                        - "ARTICLES_OF_ASSOCIATION"
                        - "PROOF_OF_ADDRESS"
                missingUboVerification:
                  summary: Company account has no approved UBOs
                  value:
                    code: "MISSING_DOCUMENTS_FOR_REVIEW"
                    message: "Not all documents uploaded for review submission"
                    details:
                      accountId: "5b7c1f2a-3d4e-4f8a-9b1c-2d3e4f5a6b7c"
                      missingDocumentTypes:
                        - "UBO_VERIFICATION"

  # ── Funding instructions ─────────────────────────────────────────
  /api/accounts/{accountId}/fundingInstructions:
    get:
      operationId: listFundingInstructions
      tags:
        - Funding instructions
      summary: List funding instructions
      description: Retrieves funding instructions for depositing into an account. Returns all available payment rails (PIX, TED, Boleto, crypto).
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/TraceVersion"
      responses:
        "200":
          description: List of funding instructions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FundingInstructionResponse"
              examples:
                mixed:
                  summary: PIX and TED instructions
                  value:
                    - asset: "BRL"
                      rail: "PIX_KEY"
                      keyType: "CNPJ"
                      key: "12345678000101"
                    - asset: "BRL"
                      rail: "TED"
                      bankCode: "001"
                      branch: "0001"
                      accountNumber: "123456-7"
                      accountType: "CHECKING"
        "400":
          description: Invalid account ID format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidUuid:
                  summary: accountId path parameter is not a valid UUID
                  value:
                    code: "INVALID_DATA"
                    message: "Object contains invalid data"
                    details:
                      errors:
                        - code: "INVALID_UUID"
                          message: "'not-a-uuid' cannot be converted to UUID"
                          field: "path:accountId"
                          params: {}
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Account not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                accountNotFound:
                  $ref: "#/components/examples/AccountNotFound"

  # ── Documents ────────────────────────────────────────────────────
  /api/documents:
    post:
      operationId: uploadDocument
      tags:
        - Documents
      summary: Upload a document
      description: >
        Uploads a document to fulfill an account or beneficial owner requirement.

        The same endpoint serves account-level and UBO-level documents — set
        `holder.type` to `ACCOUNT` with the account ID, or to `UBO` with the
        beneficial owner ID, in the JSON `body` part.
      parameters:
        - $ref: "#/components/parameters/TraceVersion"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                body:
                  $ref: "#/components/schemas/UploadDocumentRequest"
                file:
                  type: string
                  format: binary
                  description: Document file content.
              required:
                - body
                - file
            encoding:
              body:
                contentType: application/json
            examples:
              accountDocument:
                summary: Account-level document (e.g., articles of association)
                value:
                  body:
                    documentType: "ARTICLES_OF_ASSOCIATION"
                    holder:
                      type: "ACCOUNT"
                      referenceId: "5b7c1f2a-3d4e-4f8a-9b1c-2d3e4f5a6b7c"
              uboIdentity:
                summary: UBO identity document with sub-type and metadata
                value:
                  body:
                    documentType: "ID_CARD"
                    documentSubType: "FRONT_SIDE"
                    holder:
                      type: "UBO"
                      referenceId: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                    metadata:
                      country: "BR"
      responses:
        "204":
          description: Document uploaded.
        "400":
          description: Invalid request or missing multipart fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                emptyFile:
                  summary: Uploaded file is empty
                  value:
                    code: "EMPTY_FILE"
                    message: "File must not be empty: fieldName=file"
                    details:
                      fieldName: "file"
                missingMultipartField:
                  summary: Required multipart field is missing
                  value:
                    code: "MISSING_MULTIPART_FIELD"
                    message: "Missing required multipart field: fieldName=body"
                    details:
                      fieldName: "body"
                fileTooLarge:
                  summary: Uploaded file exceeds the maximum allowed size
                  value:
                    code: "FILE_TOO_LARGE"
                    message: "File size exceeds the maximum allowed"
                    details:
                      fileSizeBytes: 12000000
                      maxSizeBytes: 10000000
                unsupportedFileType:
                  summary: Uploaded file type is not allowed
                  value:
                    code: "UNSUPPORTED_FILE_TYPE"
                    message: "Unsupported file type"
                    details:
                      detected: "EXECUTABLE"
                invalidReferenceId:
                  summary: holder.referenceId is not a valid UUID
                  value:
                    code: "INVALID_DATA"
                    message: "Object contains invalid data"
                    details:
                      errors:
                        - code: "INVALID_UUID"
                          message: "'not-a-uuid' cannot be converted to UUID"
                          field: "body:holder.referenceId"
                          params: {}
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Account or beneficial owner not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                accountNotFound:
                  $ref: "#/components/examples/AccountNotFound"
                uboNotFound:
                  $ref: "#/components/examples/UboNotFound"

  # ── Beneficial owner endpoints ───────────────────────────────────
  /api/accounts/{accountId}/ubos:
    post:
      operationId: addUbo
      tags:
        - Beneficial owners
      summary: Add a beneficial owner
      description: Adds a beneficial owner (UBO) to a company-owned account.
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/TraceVersion"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UBORequest"
            examples:
              basic:
                summary: Add a UBO
                value:
                  name: "João Silva"
                  taxId:
                    value: "12345678909"
                    type: "CPF"
                    country: "BR"
                  address:
                    addressLine1: "Rua das Flores, 100"
                    city: "São Paulo"
                    state: "SP"
                    country: "BR"
                    postalCode: "01234-567"
                  ownershipPercentage: 50.0
      responses:
        "201":
          description: Beneficial owner added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UBOResponse"
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidTaxId:
                  summary: UBO taxId fails the country/type-specific validator
                  value:
                    code: "INVALID_DATA"
                    message: "Object contains invalid data"
                    details:
                      errors:
                        - code: "VALIDATE_TAX_ID"
                          message: "Tax ID is invalid for the given type and country"
                          field: "body:taxId.value"
                          params: {}
                invalidData:
                  summary: Request body failed validation
                  value:
                    code: "INVALID_DATA"
                    message: "Object contains invalid data"
                    details:
                      errors:
                        - code: "REQUIRED"
                          message: "Parameter 'body:name' not found in request"
                          field: "body:name"
                          params: {}
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Account not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
