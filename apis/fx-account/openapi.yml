                          field: "body:name"
                          params: {}
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Account not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                accountNotFound:
                  $ref: "#/components/examples/AccountNotFound"
        "409":
          description: UBO already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                duplicateUbo:
                  summary: A UBO with this taxId is already registered on the account
                  value:
                    code: "DUPLICATE_UBO"
                    message: "A UBO with this tax ID already exists"
                    details:
                      taxId: "12345678900"
        "422":
          description: Business rule violation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                ubosNotAllowedForIndividual:
                  summary: Account has an individual owner (UBOs apply only to companies)
