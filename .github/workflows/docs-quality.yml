name: Documentation Quality

on:
  pull_request:
    branches: [main]

jobs:
  mint-build:
    name: Mintlify build validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm i -g mint
      - name: Validate build
        run: mint build
      - name: Check broken links
        run: mint broken-links
      - name: Accessibility check
        run: mint accessibility

  frontmatter:
    name: Frontmatter completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run eval
        run: python3 .claude/evals/frontmatter-completeness.py --threshold 95

  descriptions:
    name: Description quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run eval
        run: python3 .claude/evals/description-quality.py --threshold 95

  navigation:
    name: Navigation coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Orphan detection
        run: python3 .claude/evals/orphan-detector.py --threshold 90
      - name: Navigation coverage
        run: python3 .claude/evals/navigation-coverage.py --threshold 90

  openapi:
    name: OpenAPI completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run eval
        run: python3 .claude/evals/openapi-completeness.py --threshold 50

  markdown-format:
    name: Markdown linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Lint changed files
        run: npx markdownlint-cli2 "**/*.mdx" --config .markdownlint.json
